[supervisord]
nodaemon=true

[program:php-fpm]
command=php-fpm
autorestart=true

[program:nginx]
command=nginx -g "daemon off;"
autorestart=true

[program:reverb]
command=php artisan reverb:start --host=0.0.0.0 --port=8081
autorestart=true

[program:queue]
command=php artisan queue:work --sleep=3 --tries=3
autorestart=true
