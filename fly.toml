# fly.toml app configuration file generated for expedition-demo on 2026-07-07T14:55:44+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'expedition-demo'
primary_region = 'ams'

[build]
  [build.args]
    VITE_USE_MOCKS = 'false'
    VITE_API_BASE_URL = '/api'
    VITE_REVERB_HOST = 'expedition-demo.fly.dev'
    VITE_REVERB_APP_KEY = '73ea366c4c3e9c8811c774ed9f83f7b7'

[env]
  APP_DEBUG = 'false'
  APP_ENV = 'production'
  BROADCAST_CONNECTION = 'reverb'
  LOG_CHANNEL = 'stderr'
  REVERB_SCHEME = 'https'
  REVERB_SERVER_HOST = '0.0.0.0'
  REVERB_SERVER_PORT = '8081'
  DB_CONNECTION = 'pgsql'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/up'

[[vm]]
  memory = '1gb'
  cpus = 2
  memory_mb = 1024
