app = "expedition"
primary_region = "waw"

[build]

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  BROADCAST_CONNECTION = "reverb"
  REVERB_SERVER_HOST = "0.0.0.0"
  REVERB_SERVER_PORT = "8081"
  REVERB_SCHEME = "https"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/up"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
