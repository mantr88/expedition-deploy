services:
  app:
    build:
      context: .
      args:
        # Для збірки необхідно мати токен, щоб клонувати приватні репо.
        # Під час деплою можна передавати їх як build args або використовувати secrets.
        BACKEND_REF: ${BACKEND_REF:-main}
        FRONTEND_REF: ${FRONTEND_REF:-main}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME}
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
    image: expedition-app:latest
    restart: always
    ports:
      - "80:8080"
      # Відкриваємо 8081 для Reverb (WebSocket), якщо до нього будуть стукатися безпосередньо.
      # Або ж можна маршрутизувати через Nginx на порту 80 (зараз Nginx вже проксіює /app на 8081).
    environment:
      - PORT=8080
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-expedition}
      - DB_USERNAME=${DB_USERNAME:-expedition}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - APP_URL=${APP_URL:-http://localhost}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-localhost}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - REDIS_HOST=redis
      - REDIS_CLIENT=predis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8081
      - REVERB_SCHEME=http
      - APP_KEY=${APP_KEY}
      - REVERB_APP_ID=${REVERB_APP_ID:-demo-app}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-expedition}
      POSTGRES_USER: ${DB_USERNAME:-expedition}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Оптимізація для маленьких серверів (e2-micro)
    command: postgres -c shared_buffers=64MB -c work_mem=4MB -c maintenance_work_mem=16MB

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    # Обмеження використання пам'яті для кешу
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:
  redis_data:
